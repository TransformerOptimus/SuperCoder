name: Release (desktop app)

# Builds the SuperCoder desktop app for all platforms and attaches the installers
# to the published GitHub Release. The release itself is drafted by
# release-drafter and goes live when you click "Publish".
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to stamp for a build-only test run (e.g. 0.1.0). Not published."
        required: false

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Stamp version into app manifests
        if: steps.ver.outputs.version != ''
        run: node .github/scripts/set-version.mjs "${{ steps.ver.outputs.version }}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libxdo-dev

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build (and publish on release)
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing/notarization — used only if these secrets are configured.
          # When absent they're empty and the build is produced UNSIGNED (no rework
          # needed to turn signing on later: just add the secrets).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}
          # Attach artifacts to the published release; empty on workflow_dispatch.
          releaseId: ${{ github.event_name == 'release' && github.event.release.id || '' }}

      - name: Upload test bundles (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: supercoder-${{ matrix.target }}
          path: ${{ join(fromJSON(steps.tauri.outputs.artifactPaths), '\n') }}
          if-no-files-found: ignore

  bench-runner:
    # The eval-harness bench-runner: a static musl x86_64 binary that runs the
    # agent headless inside toolchain-free task containers. Not a tauri bundle, so
    # it lives outside the desktop build matrix.
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: swatinem/rust-cache@v2
        with:
          key: musl-bench-runner

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build static bench-runner
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build --release --locked -p bench-runner --target x86_64-unknown-linux-musl

      - name: Stage artifact
        run: cp target/x86_64-unknown-linux-musl/release/bench-runner bench-runner-x86_64-unknown-linux-musl

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" bench-runner-x86_64-unknown-linux-musl --clobber

      - name: Upload as workflow artifact (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: bench-runner-x86_64-unknown-linux-musl
          path: bench-runner-x86_64-unknown-linux-musl
